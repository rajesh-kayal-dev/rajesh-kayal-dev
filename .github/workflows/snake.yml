name: generate-snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake grid
        uses: Platane/snk@v3
        with:
          github_user_name: rajesh-kayal-dev
          outputs: |
            dist/snake.svg?color_snake=%233B82F6&color_background=%230D1117&color_dots=%23161B22,%230e4429,%23006d32,%2326a641,%2339d353
            dist/snake-dark.svg?palette=github-dark&color_snake=%233B82F6

      - name: push output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
