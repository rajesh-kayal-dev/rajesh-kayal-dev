<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0A0A0B; }
    .dot { fill: #1C1C20; }
    .eyebrow { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 15px; fill: #3B82F6; letter-spacing: 0.5px; }
    .name { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 54px; font-weight: 700; fill: #EDEDEF; letter-spacing: -1px; }
    .role { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 20px; font-weight: 400; fill: #9A9AA2; letter-spacing: 0.2px; }
    .tag { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 13px; fill: #57575F; }
    .status-text { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; fill: #6B6B73; }
    .cursor { fill: #3B82F6; }

    @keyframes blink { 0%, 45% { opacity: 1; } 50%, 95% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes drawline { from { stroke-dashoffset: 460; } to { stroke-dashoffset: 0; } }
    @keyframes pulse { 0% { opacity: 0.35; r: 3; } 50% { opacity: 1; r: 4; } 100% { opacity: 0.35; r: 3; } }
    @keyframes scan { 0% { transform: translateX(-120px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(1200px); opacity: 0; } }

    .cursor-blink { animation: blink 1.1s step-end infinite; }
    .underline { stroke-dasharray: 460; animation: drawline 1.8s ease-out forwards; }
    .status-dot { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .scanline { animation: scan 5.5s linear infinite; }
  </style>

  <rect width="1200" height="300" class="bg" />

  <!-- dot grid -->
  <g opacity="0.5">
    <pattern id="dotGrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" class="dot" />
    </pattern>
    <rect width="1200" height="300" fill="url(#dotGrid)" />
  </g>

  <!-- fade mask edges -->
  <defs>
    <linearGradient id="edgeFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A0A0B" stop-opacity="1" />
      <stop offset="10%" stop-color="#0A0A0B" stop-opacity="0" />
      <stop offset="90%" stop-color="#0A0A0B" stop-opacity="0" />
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0" />
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="1" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#edgeFade)" />

  <!-- status chip -->
  <g transform="translate(1005, 40)">
    <rect x="0" y="0" width="160" height="28" rx="4" fill="none" stroke="#1E1E22" stroke-width="1" />
    <circle class="status-dot" cx="18" cy="14" r="3" fill="#3B82F6" />
    <text x="30" y="18" class="status-text">status: building</text>
  </g>

  <!-- eyebrow -->
  <text x="100" y="95" class="eyebrow">~ whoami<tspan class="cursor-blink">_</tspan></text>

  <!-- name -->
  <text x="98" y="150" class="name">Rajesh Kayal</text>

  <!-- animated underline -->
  <line x1="100" y1="172" x2="500" y2="172" stroke="url(#accentGrad)" stroke-width="2" class="underline" />

  <!-- role -->
  <text x="100" y="205" class="role">Software Developer — Backend &amp; Full Stack Specialist</text>

  <!-- tagline -->
  <text x="100" y="235" class="tag">node.js · typescript · fastify · postgresql · aws · microservices · langchain</text>

  <!-- scanline representing uptime / reliability -->
  <g class="scanline">
    <line x1="0" y1="272" x2="120" y2="272" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.5" />
  </g>
  <line x1="100" y1="272" x2="1100" y2="272" stroke="#17171B" stroke-width="1" />
</svg>
