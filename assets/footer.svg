<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .footer-text { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-size: 13px; fill: #57575F; }
    .footer-accent { fill: #3B82F6; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade { animation: fadeIn 1.2s ease-out forwards; }
  </style>

  <defs>
    <linearGradient id="footerLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A0A0B" stop-opacity="0" />
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="0" />
    </linearGradient>
  </defs>

  <line x1="0" y1="30" x2="1200" y2="30" stroke="url(#footerLine)" stroke-width="1" />

  <g class="fade">
    <text x="600" y="75" text-anchor="middle" class="footer-text">
      built for reliability<tspan class="footer-accent"> · </tspan>designed with restraint<tspan class="footer-accent"> · </tspan>shipped with care
    </text>
  </g>
</svg>
